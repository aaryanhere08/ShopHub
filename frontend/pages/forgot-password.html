<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - ShopHub</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-aside">
            <a class="logo" href="../index.html">ShopHub</a>
            <h1>Reset your password without the stress.</h1>
            <p>Enter the email you used at signup and choose a new password for this browser demo.</p>
        </section>

        <section class="auth-panel">
            <div class="auth-card">
                <h2>Forgot Password</h2>
                <p>This updates your saved demo account in localStorage.</p>

                <form id="forgotForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" autocomplete="email" required>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" name="newPassword" autocomplete="new-password" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm New Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password" minlength="6" required>
                    </div>
                    <button type="submit" class="auth-btn">Reset Password</button>
                    <div id="message" class="message"></div>
                </form>

                <div class="auth-links">
                    <a href="login.html">Back to login</a>
                    <a href="signup.html">Create account</a>
                </div>
            </div>
        </section>
    </main>

    <script>
        const form = document.getElementById("forgotForm");
        const messageDiv = document.getElementById("message");

        form.addEventListener("submit", function(event) {
            event.preventDefault();

            const email = document.getElementById("email").value.trim().toLowerCase();
            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;
            const users = JSON.parse(localStorage.getItem("users")) || [];
            const userIndex = users.findIndex((user) => user.email.toLowerCase() === email);

            if (userIndex === -1) {
                showMessage("No account was found for this email.", "error");
                return;
            }

            if (newPassword.length < 6) {
                showMessage("Password must be at least 6 characters.", "error");
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage("New passwords do not match.", "error");
                return;
            }

            users[userIndex].password = newPassword;
            users[userIndex].updatedAt = new Date().toISOString();
            localStorage.setItem("users", JSON.stringify(users));

            const currentUser = JSON.parse(localStorage.getItem("user") || "null");
            if (currentUser && currentUser.email.toLowerCase() === email) {
                localStorage.removeItem("user");
            }

            showMessage("Password reset successfully. Redirecting to login...", "success");
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1100);
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message show ${type}`;
        }
    </script>
</body>
</html>
