<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - ShopHub</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="checkout-page">
    <nav class="navbar">
        <div class="container">
            <a class="logo" href="../index.html">ShopHub</a>
            <ul class="nav-menu">
                <li><a href="../index.html">Home</a></li>
                <li><a href="../index.html#products">Products</a></li>
            </ul>
        </div>
    </nav>

    <main class="checkout-container">
        <form id="checkoutForm" class="checkout-form">
            <h3>Shipping Address</h3>
            <p class="muted">Tell us where to send your order.</p>
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" autocomplete="given-name" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" autocomplete="family-name" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" autocomplete="tel" required>
                </div>
            </div>
            <div class="form-group">
                <label for="address">Street Address</label>
                <input type="text" id="address" name="address" autocomplete="street-address" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" autocomplete="address-level2" required>
                </div>
                <div class="form-group">
                    <label for="zipcode">ZIP Code</label>
                    <input type="text" id="zipcode" name="zipcode" autocomplete="postal-code" required>
                </div>
            </div>

            <h3>Payment Information</h3>
            <p class="muted">Demo checkout only. Do not enter real card details.</p>
            <div class="form-group">
                <label for="cardName">Cardholder Name</label>
                <input type="text" id="cardName" name="cardName" autocomplete="cc-name" required>
            </div>
            <div class="form-group">
                <label for="cardNumber">Card Number</label>
                <input type="text" id="cardNumber" name="cardNumber" inputmode="numeric" placeholder="4242 4242 4242 4242" maxlength="19" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="expiry">Expiry Date</label>
                    <input type="text" id="expiry" name="expiry" inputmode="numeric" placeholder="MM/YY" maxlength="5" required>
                </div>
                <div class="form-group">
                    <label for="cvv">CVV</label>
                    <input type="text" id="cvv" name="cvv" inputmode="numeric" placeholder="123" maxlength="4" required>
                </div>
            </div>

            <button type="submit" class="checkout-btn">Complete Purchase</button>
            <div class="auth-links">
                <a href="../index.html">Continue Shopping</a>
            </div>
            <div id="message" class="message"></div>
        </form>

        <aside class="order-summary">
            <h3>Order Summary</h3>
            <div class="cart-items" id="cartItems">
                <div class="empty-message">Your cart is empty.</div>
            </div>
            <div class="order-total">
                <span>Total</span>
                <span id="orderTotal">$0.00</span>
            </div>
        </aside>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 ShopHub. All rights reserved.</p>
            <p>support@shophub.com</p>
        </div>
    </footer>

    <script>
        let cart = [];
        const money = new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" });
        const messageDiv = document.getElementById("message");

        document.addEventListener("DOMContentLoaded", () => {
            loadCheckout();
            prefillUser();
        });

        document.getElementById("cardNumber").addEventListener("input", function() {
            this.value = this.value.replace(/\D/g, "").slice(0, 16).replace(/(.{4})/g, "$1 ").trim();
        });

        document.getElementById("expiry").addEventListener("input", function() {
            const value = this.value.replace(/\D/g, "").slice(0, 4);
            this.value = value.length > 2 ? `${value.slice(0, 2)}/${value.slice(2)}` : value;
        });

        document.getElementById("cvv").addEventListener("input", function() {
            this.value = this.value.replace(/\D/g, "").slice(0, 4);
        });

        document.getElementById("checkoutForm").addEventListener("submit", function(event) {
            event.preventDefault();

            if (cart.length === 0) {
                showMessage("Your cart is empty. Add a product before checkout.", "error");
                return;
            }

            const order = {
                id: Date.now(),
                cart,
                total: cart.reduce((sum, item) => sum + item.price * item.quantity, 0),
                shippingInfo: {
                    firstName: document.getElementById("firstName").value.trim(),
                    lastName: document.getElementById("lastName").value.trim(),
                    email: document.getElementById("email").value.trim(),
                    phone: document.getElementById("phone").value.trim(),
                    address: document.getElementById("address").value.trim(),
                    city: document.getElementById("city").value.trim(),
                    zipcode: document.getElementById("zipcode").value.trim()
                },
                orderDate: new Date().toISOString()
            };

            const orders = JSON.parse(localStorage.getItem("orders")) || [];
            orders.push(order);
            localStorage.setItem("orders", JSON.stringify(orders));
            localStorage.removeItem("cart");

            showMessage(`Order placed successfully. Order ID: ${order.id}`, "success");
            setTimeout(() => {
                window.location.href = "../index.html";
            }, 1300);
        });

        function loadCheckout() {
            cart = JSON.parse(localStorage.getItem("cart")) || [];
            displayCartItems();
        }

        function prefillUser() {
            const user = JSON.parse(localStorage.getItem("user") || "null");
            if (!user) return;

            document.getElementById("email").value = user.email || "";
            if (user.fullname) {
                const parts = user.fullname.split(" ");
                document.getElementById("firstName").value = parts[0] || "";
                document.getElementById("lastName").value = parts.slice(1).join(" ");
            }
        }

        function displayCartItems() {
            const cartContainer = document.getElementById("cartItems");
            const totalElement = document.getElementById("orderTotal");

            if (cart.length === 0) {
                cartContainer.innerHTML = '<div class="empty-message">Your cart is empty.</div>';
                totalElement.textContent = money.format(0);
                return;
            }

            let total = 0;
            cartContainer.innerHTML = cart.map((item) => {
                const itemTotal = item.price * item.quantity;
                total += itemTotal;
                return `
                    <div class="cart-item">
                        <div>
                            <div class="item-name">${item.name}</div>
                            <div class="item-qty">Qty: ${item.quantity}</div>
                        </div>
                        <div class="item-price">${money.format(itemTotal)}</div>
                    </div>
                `;
            }).join("");

            totalElement.textContent = money.format(total);
        }

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message show ${type}`;
        }
    </script>
</body>
</html>
