<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ShopHub</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-aside">
            <a class="logo" href="../index.html">ShopHub</a>
            <h1>Welcome back to easier shopping.</h1>
            <p>Sign in to keep your cart, favorites, and checkout details ready for your next order.</p>
        </section>

        <section class="auth-panel">
            <div class="auth-card">
                <h2>Login</h2>
                <p>Use the email and password you created on signup.</p>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" autocomplete="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" autocomplete="current-password" minlength="6" required>
                    </div>
                    <button type="submit" class="auth-btn">Login</button>
                    <div id="message" class="message"></div>
                </form>

                <div class="auth-links">
                    <a href="forgot-password.html">Forgot password?</a>
                    <a href="signup.html">Create account</a>
                </div>
                <div class="auth-links">
                    <a href="../index.html">Back to Home</a>
                </div>
            </div>
        </section>
    </main>

    <script>
        const form = document.getElementById("loginForm");
        const messageDiv = document.getElementById("message");

        form.addEventListener("submit", function(event) {
            event.preventDefault();

            const email = document.getElementById("email").value.trim().toLowerCase();
            const password = document.getElementById("password").value;
            const users = JSON.parse(localStorage.getItem("users")) || [];
            const user = users.find((item) => item.email.toLowerCase() === email && item.password === password);

            if (!user) {
                showMessage("Email or password is incorrect.", "error");
                return;
            }

            localStorage.setItem("user", JSON.stringify({
                id: user.id,
                fullname: user.fullname,
                email: user.email,
                loginTime: new Date().toISOString()
            }));

            showMessage("Login successful. Redirecting...", "success");
            setTimeout(() => {
                window.location.href = "../index.html";
            }, 900);
        });

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message show ${type}`;
        }
    </script>
</body>
</html>
