<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ShopHub</title>
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body>
    <main class="auth-page">
        <section class="auth-aside">
            <a class="logo" href="../index.html">ShopHub</a>
            <h1>Create your shopping hub.</h1>
            <p>Save favorites, keep your cart between visits, and move faster through checkout.</p>
        </section>

        <section class="auth-panel">
            <div class="auth-card">
                <h2>Sign Up</h2>
                <p>Start with a few details. This demo stores accounts in your browser.</p>

                <form id="signupForm">
                    <div class="form-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" name="fullname" autocomplete="name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" autocomplete="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" autocomplete="new-password" minlength="6" required>
                        <div class="strength" aria-hidden="true"><span id="strengthBar"></span></div>
                        <p class="hint" id="strengthText">Use at least 6 characters.</p>
                    </div>
                    <div class="form-group">
                        <label for="confirm-password">Confirm Password</label>
                        <input type="password" id="confirm-password" name="confirm-password" autocomplete="new-password" minlength="6" required>
                    </div>
                    <button type="submit" class="auth-btn">Create Account</button>
                    <div id="message" class="message"></div>
                </form>

                <div class="auth-links">
                    <a href="login.html">Already have an account?</a>
                    <a href="../index.html">Back to Home</a>
                </div>
            </div>
        </section>
    </main>

    <script>
        const form = document.getElementById("signupForm");
        const passwordInput = document.getElementById("password");
        const strengthBar = document.getElementById("strengthBar");
        const strengthText = document.getElementById("strengthText");
        const messageDiv = document.getElementById("message");

        passwordInput.addEventListener("input", updateStrength);

        form.addEventListener("submit", function(event) {
            event.preventDefault();

            const fullname = document.getElementById("fullname").value.trim();
            const email = document.getElementById("email").value.trim().toLowerCase();
            const password = passwordInput.value;
            const confirmPassword = document.getElementById("confirm-password").value;
            const users = JSON.parse(localStorage.getItem("users")) || [];

            if (password !== confirmPassword) {
                showMessage("Passwords do not match.", "error");
                return;
            }

            if (users.some((user) => user.email.toLowerCase() === email)) {
                showMessage("An account already exists for this email.", "error");
                return;
            }

            if (!fullname || !email || password.length < 6) {
                showMessage("Please complete all fields with a valid password.", "error");
                return;
            }

            users.push({
                id: Date.now(),
                fullname,
                email,
                password,
                createdAt: new Date().toISOString()
            });
            localStorage.setItem("users", JSON.stringify(users));

            showMessage("Account created. Redirecting to login...", "success");
            setTimeout(() => {
                window.location.href = "login.html";
            }, 1000);
        });

        function updateStrength() {
            const password = passwordInput.value;
            let score = 0;
            if (password.length >= 6) score += 1;
            if (password.length >= 10) score += 1;
            if (/[A-Z]/.test(password) && /[a-z]/.test(password)) score += 1;
            if (/[0-9]/.test(password)) score += 1;
            if (/[^A-Za-z0-9]/.test(password)) score += 1;

            const width = Math.min(score * 20, 100);
            strengthBar.style.width = `${width}%`;
            strengthBar.style.background = score >= 4 ? "#0f766e" : score >= 2 ? "#f97316" : "#dc2626";
            strengthText.textContent = score >= 4 ? "Strong password." : score >= 2 ? "Good start. Add variety for extra strength." : "Use at least 6 characters.";
        }

        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = `message show ${type}`;
        }
    </script>
</body>
</html>
